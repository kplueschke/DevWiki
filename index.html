<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer-Wiki</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<button id="menu-toggle-btn" class="menu-toggle">☰ Menü</button>

<nav>
    <div style="font-size: 1.4rem; font-weight: bold; color: white; margin-bottom: 20px;">DEVELOPER-WIKI</div>

    <h2>📚 Enzyklopädie</h2>
    <ul id="nav-list">
        <!-- Dynamically generated by JS -->
    </ul>
</nav>

<main>
    <div class="header-area">
        <h1 id="page-title">Wissensdatenbank</h1>
        <div class="controls-area">
            <label class="control-toggle">
                <input type="checkbox" id="quiz-mode-toggle">
                <span>Lern-Modus 🧠</span>
            </label>
            <label class="control-toggle">
                <input type="checkbox" id="favorites-toggle">
                <span>Nur Favoriten ⭐</span>
            </label>
        </div>
        <input type="search" class="search-box" id="search" placeholder="Suchen... (Strg+K oder /)">
    </div>

    <div id="main-container">
        <!-- Dynamically generated by JS -->
    </div>
</main>

<!-- Das Modal -->
<div id="pdfModal" class="modal" onclick="closePDF(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <!-- Das 'X' zum Schließen -->
        <span class="close-btn" onclick="closePDF()">&times;</span>
        <iframe id="pdfFrame" src=""></iframe>
    </div>
</div>

<!-- Back to top button -->
<button id="back-to-top" class="back-to-top" title="Nach oben" onclick="scrollToTop()">↑</button>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
